<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Micro no Controle - Dashboard</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      background: #f4f7fb;
      color: #1f2937;
    }

    header {
      background: #0f172a;
      color: white;
      padding: 20px;
    }

    header h1 {
      margin: 0;
      font-size: 28px;
    }

    header p {
      margin: 6px 0 0;
      color: #cbd5e1;
    }

    .container {
      max-width: 1200px;
      margin: 24px auto;
      padding: 0 16px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.06);
    }

    .card h3 {
      margin: 0 0 8px;
      font-size: 15px;
      color: #64748b;
    }

    .card .value {
      font-size: 28px;
      font-weight: bold;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .panel {
      background: white;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.06);
    }

    .panel h2 {
      margin-top: 0;
      font-size: 20px;
    }

    .list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 12px;
    }

    .item {
      padding: 12px;
      border-radius: 12px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
    }

    .item strong {
      display: block;
      margin-bottom: 4px;
    }

    .muted {
      color: #64748b;
      font-size: 14px;
    }

    .entrada {
      color: #15803d;
      font-weight: bold;
    }

    .saida {
      color: #b91c1c;
      font-weight: bold;
    }

    @media (max-width: 900px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>📊 Micro no Controle</h1>
    <p>Dashboard financeiro do sistema</p>
  </header>

  <div class="container">
    <div class="cards">
      <div class="card">
        <h3>Usuários</h3>
        <div class="value" id="usuariosTotal">0</div>
      </div>

      <div class="card">
        <h3>Entradas</h3>
        <div class="value" id="entradasTotal">R$ 0,00</div>
      </div>

      <div class="card">
        <h3>Saídas</h3>
        <div class="value" id="saidasTotal">R$ 0,00</div>
      </div>

      <div class="card">
        <h3>Saldo</h3>
        <div class="value" id="saldoTotal">R$ 0,00</div>
      </div>
    </div>

    <div class="grid">
      <div class="panel">
        <h2>👥 Usuários cadastrados</h2>
        <div class="list" id="usuariosLista"></div>
      </div>

      <div class="panel">
        <h2>🧾 Últimas transações</h2>
        <div class="list" id="transacoesLista"></div>
      </div>
    </div>
  </div>

  <script>
    function formatarMoeda(valor) {
      return Number(valor || 0).toLocaleString('pt-BR', {
        style: 'currency',
        currency: 'BRL'
      });
    }

    async function carregarDashboard() {
      try {
        const telefone = new URLSearchParams(window.location.search).get('telefone') || '';
        const telefoneParam = encodeURIComponent(telefone);

        if (!telefoneParam) {
          throw new Error('telefone obrigatorio');
        }

        const [usuariosRes, transacoesRes, resumoRes] = await Promise.all([
          fetch(`/api/usuarios?telefone=${telefoneParam}`),
          fetch(`/api/transacoes?telefone=${telefoneParam}`),
          fetch(`/api/resumo?telefone=${telefoneParam}`)
        ]);

        const usuariosData = await usuariosRes.json();
        const transacoesData = await transacoesRes.json();
        const resumoData = await resumoRes.json();

        document.getElementById('usuariosTotal').textContent =
          usuariosData.total_usuarios || 0;

        document.getElementById('entradasTotal').textContent =
          formatarMoeda(resumoData.entradas || 0);

        document.getElementById('saidasTotal').textContent =
          formatarMoeda(resumoData.saidas || 0);

        document.getElementById('saldoTotal').textContent =
          formatarMoeda(resumoData.saldo || 0);

        const usuariosLista = document.getElementById('usuariosLista');
        usuariosLista.innerHTML = '';

        (usuariosData.usuarios || []).forEach(usuario => {
          const div = document.createElement('div');
          div.className = 'item';
          div.innerHTML = `
            <strong>${usuario.nome || 'Sem nome'}</strong>
            <div class="muted">📞 ${usuario.telefone || '-'}</div>
            <div class="muted">📦 Plano: ${usuario.plano || '-'}</div>
            <div class="muted">✅ Status: ${usuario.status || '-'}</div>
          `;
          usuariosLista.appendChild(div);
        });

        const transacoesLista = document.getElementById('transacoesLista');
        transacoesLista.innerHTML = '';

        const ultimas = (transacoesData.transacoes || []).slice(-8).reverse();

        ultimas.forEach(item => {
          const div = document.createElement('div');
          div.className = 'item';

          const classe = item.tipo === 'entrada' ? 'entrada' : 'saida';

          div.innerHTML = `
            <strong>${item.mensagem_original || 'Sem descrição'}</strong>
            <div class="${classe}">
              ${item.tipo === 'entrada' ? '💰 Entrada' : '💸 Saída'} - ${formatarMoeda(item.valor || 0)}
            </div>
            <div class="muted">📂 ${item.categoria || 'geral'}</div>
            <div class="muted">📞 ${item.telefone || '-'}</div>
            <div class="muted">🕒 ${item.criado_em || '-'}</div>
          `;

          transacoesLista.appendChild(div);
        });
      } catch (error) {
        console.error('Erro ao carregar dashboard:', error);
        alert('Erro ao carregar dashboard.');
      }
    }

    carregarDashboard();
  </script>
</body>
</html>
